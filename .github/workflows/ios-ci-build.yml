name: iOS CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_PATH: Timberline Trail App.xcodeproj
      SCHEME_NAME: Timberline Trail App
      GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Ensure GoogleService-Info.plist exists
        run: |
          set -euo pipefail
          APP_DIR="$GITHUB_WORKSPACE/Timberline Trail App"
          PLIST_PATH="$APP_DIR/GoogleService-Info.plist"
          if [ ! -f "$PLIST_PATH" ]; then
            mkdir -p "$APP_DIR"
            if [ -n "${GOOGLE_SERVICE_INFO_PLIST_B64:-}" ]; then
              printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$PLIST_PATH"
            else
              cat > "$PLIST_PATH" <<'EOF'
              <?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0"><dict></dict></plist>
              EOF
            fi
          fi

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          rm -f "Timberline Trail App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -resolvePackageDependencies

      - name: Build (Debug, iOS Simulator)
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            clean build
